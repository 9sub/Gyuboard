spring.application.name=board


spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

backend.db.server=localhost:3306
spring.datasource.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.jdbc-url=jdbc:mysql://${backend.db.server}/gue?serverTimezone=Asia/Seoul&useUniCode=yes&characterEncoding=UTF-8
spring.datasource.url=jdbc:mysql://${backend.db.server}/gue?serverTimezone=Asia/Seoul&useUniCode=yes&characterEncoding=UTF-8
spring.datasource.hikari.username=ssafy
spring.datasource.hikari.password=ssafy

mybatis.mapper-locations=classpath*:/mapper/**/*.xml
mybatis.type-aliases-package=com.ssafy.edu.model.dto


mybatis.configuration.map-underscore-to-camel-case=true

jwt.secret = ssafy-board-secret-key-ssafy-board-secret-key
jwt.expiration=86400000

spring.servlet.multipart.max-file-size=20MB

spring.servlet.multipart.max-request-size=25MB